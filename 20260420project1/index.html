<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Fixed and Table</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif; 
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 250px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: gray;
            color: white;
        }

        tr:nth-child(even) {
            background-color: yellow;
        }

        tr:nth-child(odd) {
            background-color: white;
        }

        tr:first-child {
            background-color: gray;
        }

        .fixed-box {
            position: fixed;
            top: 40px;  
            right: 40px;
            width: 100px;
            height: 100px;
            border: 3px solid #689f38;
            padding: 5px;
            background-color: white;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr>
            <td>1</td>
            <td>1</td>
        </tr>
        <tr>
            <td>2</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
            <td>3</td>
        </tr>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
